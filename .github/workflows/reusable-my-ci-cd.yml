name: Reusable small App CI-CD
on:
  workflow_call:
    inputs: 
      environment: 
        description: "Environment to deploy to"
        required: true
        type: string

jobs:
  build:
    name: "Build app"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "Build app"
        run: echo "Simulation build"
  
  printEnvironment:
    environment: ${{ inputs.environment }}
    name: "Print environment"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "Print environment"
        run: echo "Environment ${{ inputs.environment }}"
  
  deploy:
    environment: ${{ inputs.environment }}
    name: "Deploy app"
    runs-on: ubuntu-latest
    needs: printEnvironment
    steps:
      - uses: actions/checkout@v7
      - name: "Deploy app"
        run: echo "Simulation deploy"
