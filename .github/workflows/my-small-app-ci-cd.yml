name: My small App CI-CD
on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: "Build app"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "Build app"
        run: echo "Simulation build"
        
  printEnvironment:
    name: "Print environment"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "Print environment"
        run: echo "Environment ${{ github.env }}"
  
  deploy:
    name: "Deploy app"
    runs-on: ubuntu-latest
    needs: printEnvironment
    steps:
      - uses: actions/checkout@v7
      - name: "Deploy app"
        run: echo "Simulation deploy"
